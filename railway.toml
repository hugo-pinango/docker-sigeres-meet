# Railway configuration for Jitsi Meet
# Este archivo configura el servicio principal (web) cuando se despliega desde la raíz.
# Para multi-servicio, cada servicio apunta a su Dockerfile en railway/

[build]
dockerfilePath = "railway/Dockerfile.web"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
